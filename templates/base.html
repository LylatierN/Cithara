<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cithara{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#a855f7', /* purple-500 — our accent */
              dark:    '#7e22ce', /* purple-800 */
              light:   '#d8b4fe', /* purple-300 */
            },
            surface: {
              DEFAULT: '#0f0f0f', /* near-black page bg */
              card:    '#1a1a1a', /* slightly lighter card bg */
              border:  '#2a2a2a', /* subtle border */
            },
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body:    ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- Google Fonts: Playfair Display (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-surface text-white font-body min-h-screen antialiased">

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="fixed top-0 inset-x-0 z-50 border-b border-surface-border bg-surface/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">

      <!-- Logo -->
      <a href="/" class="font-display text-xl text-brand tracking-wide">
        Cithara
      </a>

      <!-- Nav tabs: Library / Generate -->
  <div class="flex items-center gap-1">
    <a href="{% url 'dashboard' %}"
      id="nav-library"
      class="px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
              text-gray-400 hover:text-white hover:bg-surface-card">
      Library
    </a>
    <a href="{% url 'generate' %}"
      id="nav-generate"
      class="px-4 py-1.5 rounded-lg text-sm font-medium transition-colors
              text-gray-400 hover:text-white hover:bg-surface-card">
      + Generate
    </a>
  </div>

  <!-- Right side: username + logout -->
  <div class="flex items-center gap-3">
    <span id="nav-username" class="text-sm text-gray-400"></span>
  <button id="logout-btn" class="hover:text-white transition-colors text-sm"
        onclick="(async function(){
          const refresh = sessionStorage.getItem('refresh');
          const access = sessionStorage.getItem('access');
          try {
            await fetch('/api/auth/logout/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + access },
              body: JSON.stringify({ refresh })
            });
          } finally {
            sessionStorage.clear();
            window.location.href = '/login/';
          }
        })()">
  Logout
</button>
  </div>

  <script>
    // Highlight the active tab based on current URL
    (function() {
      const path = window.location.pathname;
      if (path.startsWith('/dashboard')) {
        document.getElementById('nav-library').classList.add('bg-surface-card', 'text-white');
      } else if (path.startsWith('/generate')) {
        document.getElementById('nav-generate').classList.add('bg-surface-card', 'text-white');
      }
    })();
  </script>

    </div>
  </nav>

  <!-- ── Main content (push down by navbar height) ──────── -->
  <main class="pt-14 min-h-screen flex flex-col">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Shared JS block ────────────────────────────────── -->
  {% block extra_js %}{% endblock %}

</body>

<script>
  document.getElementById('logout-btn').addEventListener('click', async function() {
    const refresh = sessionStorage.getItem('refresh');
    const access = sessionStorage.getItem('access');
    try {
      await fetch('/api/auth/logout/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + access
        },
        body: JSON.stringify({ refresh })
      });
    } finally {
      sessionStorage.clear();
      window.location.href = '/login/';
    }
  });
</script>

</html>
